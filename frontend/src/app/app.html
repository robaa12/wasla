<div [attr.lang]="currentLang()" [attr.dir]="isArabic ? 'rtl' : 'ltr'" [class.font-arabic]="isArabic"
  [class.font-sans]="!isArabic"
  class="relative flex min-h-screen flex-col overflow-x-hidden bg-dark-base text-neutral-50">

  <app-navbar [t]="t" [scrolled]="scrolled()" (languageToggled)="toggleLanguage()"
    (sectionScrolled)="scrollToSection($event)" (shortenerScrolled)="scrollToSection('shortener')" />

  @if (currentRoute() === '/') {
    <app-hero [t]="t" [longUrl]="longUrl" [isLoading]="isLoading()" [errorMessage]="errorMessage()"
      [shortenedData]="shortenedData()" [showCopiedToast]="showCopiedToast()" (longUrlChange)="longUrl = $event"
      (shorten)="shortenUrl()" (copy)="copyToClipboard($event)" />

    <app-stats [t]="t" />

    <app-features [t]="t" />

    <app-how-it-works [t]="t" />

    <app-cta [t]="t" (sectionScrolled)="scrollToSection($event)" />
  } @else {
    <main class="flex-1 w-full pt-20 pb-12 flex flex-col items-center">
      <router-outlet></router-outlet>
    </main>
  }

  <app-footer [t]="t" (languageToggled)="toggleLanguage()" (sectionScrolled)="scrollToSection($event)" />

</div>

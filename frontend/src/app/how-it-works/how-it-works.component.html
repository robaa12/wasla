<section id="how-it-works" class="how-section py-24 px-4 relative">
  <div class="section-glow section-glow-amber"></div>

  <div class="mx-auto max-w-5xl">
    <div class="section-header text-center mb-16">
      <div class="section-eyebrow">Simple Process</div>
      <h2 class="section-title">{{ t.howTitle }}</h2>
      <p class="section-subtitle">{{ t.howSubtitle }}</p>
    </div>

    <div class="steps-container">
      <!-- Step 1 -->
      <div class="step-card" id="step-1">
        <div class="step-number">01</div>
        <div class="step-content">
          <div class="step-icon-wrap">
            <svg class="step-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
            </svg>
          </div>
          <div>
            <h3 class="step-title">{{ t.step1Title }}</h3>
            <p class="step-desc">{{ t.step1Desc }}</p>
          </div>
        </div>
        <div class="step-connector"></div>
      </div>

      <!-- Step 2 -->
      <div class="step-card" id="step-2">
        <div class="step-number">02</div>
        <div class="step-content">
          <div class="step-icon-wrap step-icon-amber">
            <svg class="step-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" />
            </svg>
          </div>
          <div>
            <h3 class="step-title">{{ t.step2Title }}</h3>
            <p class="step-desc">{{ t.step2Desc }}</p>
          </div>
        </div>
        <div class="step-connector"></div>
      </div>

      <!-- Step 3 -->
      <div class="step-card" id="step-3">
        <div class="step-number">03</div>
        <div class="step-content">
          <div class="step-icon-wrap step-icon-purple">
            <svg class="step-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
            </svg>
          </div>
          <div>
            <h3 class="step-title">{{ t.step3Title }}</h3>
            <p class="step-desc">{{ t.step3Desc }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

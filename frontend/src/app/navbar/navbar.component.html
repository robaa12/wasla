<header class="navbar-wrapper fixed top-0 inset-x-0 z-50 transition-all duration-300"
  [class.navbar-scrolled]="scrolled">
  <nav class="mx-auto flex w-full max-w-7xl items-center justify-between px-6 py-4">

    <!-- Logo -->
    <a class="flex cursor-pointer items-center gap-3 group" routerLink="/">
      <img src="/wasla logo with text.png" alt="Wasla logo"
        class="h-32 w-auto object-contain transition-opacity group-hover:opacity-80" />
    </a>

    <!-- Center nav links -->
    <div class="hidden md:flex items-center gap-1">
      <button (click)="sectionScrolled.emit('features')" class="nav-link">{{ t.navFeatures }}</button>
      <button (click)="sectionScrolled.emit('how-it-works')" class="nav-link">{{ t.navHowItWorks }}</button>
      <button (click)="sectionScrolled.emit('stats')" class="nav-link">{{ t.navAnalytics }}</button>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-2">
      <button (click)="languageToggled.emit()" class="nav-lang-btn">{{ t.langToggle }}</button>
      @if (!auth.isAuthenticated()) {
      <a class="btn-ghost-teal" routerLink="/login">{{ t.login }}</a>
      <a class="btn-primary-amber" routerLink="/register">{{ t.signup }}</a>
      } @else {
      <a class="btn-ghost-teal" routerLink="/dashboard">{{ t.navDashboard }}</a>
      <button class="btn-primary-amber" (click)="logout()">{{ t.navSignOut }}</button>
      }
    </div>

  </nav>
</header>

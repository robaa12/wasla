# Add Redis service to the docker-compose.yml file
version: '3.8'
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

# Add 2 postgres db shards
  postgres_shard1:
    image: postgres:15-alpine
    container_name: postgres_shard1
    environment:
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: password1
      POSTGRES_DB: shard1_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_shard1_data:/var/lib/postgresql/data
    restart: unless-stopped

  postgres_shard2:
    image: postgres:15-alpine
    container_name: postgres_shard2
    environment:
      POSTGRES_USER: user2
      POSTGRES_PASSWORD: password2
      POSTGRES_DB: shard2_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_shard2_data:/var/lib/postgresql/data
    restart: unless-stopped

# Add PostgreSQL Analytics service (`db-analytics`)
  db-analytics:
    image: postgres:15-alpine
    container_name: db_analytics
    environment:
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password
      POSTGRES_DB: analytics_db
    ports:
      - "5434:5432"
    volumes:
      - db_analytics_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - redis
      - postgres_shard1
      - postgres_shard2
      - db-analytics
    restart: unless-stopped

volumes:
  redis_data:
  postgres_shard1_data:
  postgres_shard2_data:
  db_analytics_data:
